<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Audio Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            width: 350px;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            color: #00d2ff;
        }

        audio {
            width: 100%;
            filter: drop-shadow(2px 4px 6px black);
        }

        /* Adding a small decorative element */
        .visualizer-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: #00d2ff;
            border-radius: 50%;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>Now Playing</h1>
        
        <audio controls>
            <source src="c:\Users\34640\Downloads\ElevenLabs_2026-03-24T12_47_21_Roger - Laid-Back, Casual, Resonant_pre_sp100_s50_sb75_se0_b_m2.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="visualizer-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
